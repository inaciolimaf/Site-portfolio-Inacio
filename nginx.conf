server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Item 7 — não expor a versão do nginx no header Server
    server_tokens off;

    # Item 6 — headers de segurança (always => aplicam também a 404/erros).
    # Obs.: nenhum `location` abaixo usa `add_header`, senão o nginx descartaria
    # estes headers naquele contexto (add_header não é aditivo entre níveis).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Assets com hash de build → cache longo (usar `expires` em vez de add_header
    # para preservar a herança dos headers de segurança acima).
    location /assets/ {
        expires 1y;
        try_files $uri =404;
    }

    # Rotas reais da SPA → servem o app com HTTP 200.
    # Ao criar uma página nova, adicione a rota aqui.
    location = / {
        expires -1;
        try_files /index.html =404;
    }
    location = /inkstave {
        expires -1;
        try_files /index.html =404;
    }
    location = /index.html {
        expires -1;
    }

    # Arquivos estáticos reais (favicon, og-image, robots, sitemap, projects/…)
    # ou 404 de verdade para o que não existe.
    location / {
        try_files $uri =404;
    }

    # Item 2 — rota desconhecida serve o shell da SPA (que renderiza a página
    # NotFound), mas mantendo o status HTTP 404 de verdade.
    error_page 404 =404 /index.html;
}
